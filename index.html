<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esther Yuan — AI PM</title>
<meta name="description" content="A living roadmap of what I've shipped, what I'm building, and where I'm going.">

<!-- ── Theme + favicon ───────────────────────────────────────────── -->
<meta name="theme-color" content="#FAF7F0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1A1F" media="(prefers-color-scheme: dark)">
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<!-- ── Open Graph / Twitter ──────────────────────────────────────── -->
<meta property="og:type" content="website">
<meta property="og:title" content="Esther Yuan — AI PM">
<meta property="og:description" content="A living roadmap of what I've shipped, what I'm building, and where I'm going.">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Esther Yuan — AI PM">
<meta name="twitter:description" content="A living roadmap of what I've shipped, what I'm building, and where I'm going.">
<meta name="twitter:image" content="og-image.png">

<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<main class="page" id="main-content">

  <!-- ── TOP NAV ─────────────────────────────────────────────────── -->
  <nav class="topnav rise">
    <div class="brand"><span class="dot"></span><span id="brand-name"></span></div>
    <div class="meta" id="last-updated"></div>
  </nav>

  <!-- ── HERO ────────────────────────────────────────────────────── -->
  <header class="hero rise rise-1">
    <div class="hero-left">
      <!-- Avatar sits inline on the left of the name/slogan block.
           Calm by default; swaps to talking on hover/focus/tap. -->
      <button type="button" class="hero-avatar" id="hero-avatar"
              aria-label="Avatar — tap or hover to see me say hi">
        <img class="avatar-img avatar-calm"    id="avatar-calm"    alt="">
        <img class="avatar-img avatar-talking" id="avatar-talking" alt="" aria-hidden="true">
      </button>
      <div class="hero-text">
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-slogan" id="hero-slogan"></p>
        <div class="hero-meta" id="hero-meta"></div>
      </div>
    </div>
    <div class="hero-ctas" id="hero-ctas"></div>
  </header>

  <!-- ── BOARD ───────────────────────────────────────────────────── -->
  <section class="board-section rise rise-2" aria-label="Project board" id="shipped">

    <!-- toolbar: board name + view tabs + count -->
    <div class="board-toolbar">
      <div class="board-toolbar-left">
        <h2 class="board-name">
          <span class="board-icon" aria-hidden="true">⊞</span>
          <span id="board-name-text">Roadmap</span>
        </h2>
        <div class="board-views" role="tablist" aria-label="Board view">
          <button class="view-tab is-active" type="button" role="tab" aria-selected="true">Board</button>
          <button class="view-tab is-disabled" type="button" role="tab" aria-selected="false" aria-disabled="true" title="coming soon">Timeline</button>
          <button class="view-tab is-disabled" type="button" role="tab" aria-selected="false" aria-disabled="true" title="coming soon">Specs</button>
        </div>
      </div>
      <div class="board-toolbar-right">
        <span class="board-stat"><strong id="board-total-count">0</strong> cards</span>
        <span class="board-stat sep">·</span>
        <span class="board-stat" id="board-shipped-count">0 shipped</span>
        <kbd class="kbd-hint" aria-hidden="true">⌘K</kbd>
      </div>
    </div>

    <!-- filter chips (click to filter by tag) -->
    <div class="board-filters" id="board-filters" role="group" aria-label="Filter by tag">
      <button class="filter-chip is-active" type="button" data-filter="all">All</button>
      <!-- tag chips injected by render.js -->
    </div>

    <!-- columns -->
    <div class="board" id="board">
      <article class="column col-shipped" id="col-shipped" aria-labelledby="col-shipped-title">
        <header class="col-head">
          <h3 class="col-title" id="col-shipped-title"><span class="col-dot"></span>Shipped</h3>
          <span class="col-count" data-count="shipped">0</span>
        </header>
        <div class="col-cards" data-cards="shipped"></div>
      </article>

      <article class="column col-now" id="now" aria-labelledby="col-now-title">
        <header class="col-head">
          <h3 class="col-title" id="col-now-title"><span class="col-dot"></span>Now</h3>
          <span class="col-count" data-count="now">0</span>
        </header>
        <div class="col-cards" data-cards="now"></div>
      </article>

      <article class="column col-next" id="col-next" aria-labelledby="col-next-title">
        <header class="col-head">
          <h3 class="col-title" id="col-next-title"><span class="col-dot"></span>Next</h3>
          <span class="col-count" data-count="next">0</span>
        </header>
        <div class="col-cards" data-cards="next"></div>
      </article>

      <article class="column col-later" id="col-later" aria-labelledby="col-later-title">
        <header class="col-head">
          <h3 class="col-title" id="col-later-title"><span class="col-dot"></span>Later</h3>
          <span class="col-count" data-count="later">0</span>
        </header>
        <div class="col-cards" data-cards="later"></div>
      </article>
    </div>

  </section>

  <!-- ── LENS: how I think ───────────────────────────────────────── -->
  <section class="section rise rise-3" id="lens">
    <header class="sec-head">
      <span class="sec-cmd" id="lens-cmd"></span>
      <span class="sec-title" id="lens-title"></span>
      <span class="sec-meta" id="lens-meta"></span>
    </header>
    <div class="lens" id="lens-list"></div>
  </section>

  <!-- ── CONTACT ─────────────────────────────────────────────────── -->
  <section class="section rise rise-4" id="contact">
    <header class="sec-head">
      <span class="sec-cmd" id="contact-cmd"></span>
      <span class="sec-title" id="contact-title"></span>
    </header>
    <div class="contact">
      <p class="contact-intro" id="contact-intro"></p>
      <div class="contact-list" id="contact-list"></div>
    </div>
  </section>

  <!-- ── COMMENTS (Giscus) ───────────────────────────────────────────
       Setup (one-time, owner only):
       1. Enable GitHub Discussions on the repo
       2. Visit https://giscus.app and configure for AntaresYuan/personal_website
       3. Paste the generated data-repo-id and data-category-id below
       4. Uncomment the <script> block
       Until then, this section renders the empty-state placeholder.
  ──────────────────────────────────────────────────────────────────── -->
  <section class="section comments-section" aria-label="Comments">
    <header class="sec-head">
      <span class="sec-cmd">$ comments</span>
      <span class="sec-title">notes from readers</span>
      <span class="sec-meta">via GitHub Discussions</span>
    </header>
    <div id="giscus-container">
      <p class="comments-placeholder">
        Comments will appear here once Giscus is wired up — see
        <a href="https://github.com/AntaresYuan/personal_website/issues/49">#49</a>.
      </p>
      <!--
      <script src="https://giscus.app/client.js"
              data-repo="AntaresYuan/personal_website"
              data-repo-id="REPLACE_WITH_REPO_ID"
              data-category="General"
              data-category-id="REPLACE_WITH_CATEGORY_ID"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="top"
              data-theme="light"
              data-lang="en"
              crossorigin="anonymous"
              async>
      </script>
      -->
    </div>
  </section>

  <!-- ── CARD DETAIL MODAL ──────────────────────────────────────────
       Opened by clicking any board card. Closes on ESC, backdrop click,
       or the X button. Hash sync — visiting #card/SHIP-01 opens directly.
  ──────────────────────────────────────────────────────────────────── -->
  <div class="modal-backdrop" id="modal-backdrop" hidden></div>
  <dialog class="card-modal" id="card-modal" aria-labelledby="modal-title">
    <button type="button" class="modal-close" id="modal-close" aria-label="Close">×</button>
    <div class="modal-meta-top">
      <span class="modal-id" id="modal-id"></span>
      <span class="modal-status" id="modal-status"></span>
    </div>
    <h2 class="modal-title" id="modal-title"></h2>
    <p class="modal-summary" id="modal-summary"></p>
    <div class="modal-tags" id="modal-tags"></div>
    <div class="modal-details" id="modal-details"></div>
    <div class="modal-foot">
      <span class="modal-updated" id="modal-updated"></span>
      <span class="modal-impact"  id="modal-impact"></span>
    </div>
    <div class="modal-links" id="modal-links"></div>
  </dialog>

  <!-- ── FOOTER ──────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <span id="footer-copyright"></span>
    <span><a href="/admin/">edit</a> · <a href="https://github.com/AntaresYuan/personal_website">source</a></span>
  </footer>

</main>

<script src="scripts/render.js"></script>
</body>
</html>
