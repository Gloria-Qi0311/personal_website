<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~ / ai pm</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="layout">

  <div class="shell">

    <div class="boot" id="boot"></div>

    <div class="identity">
      <h1 class="name" id="identity-name"></h1>
      <div class="role-row">
        <span id="identity-role"></span>
        <span class="dot">·</span>
        <span id="identity-location"></span>
        <span class="dot">·</span>
        <span class="now"><span class="pulse"></span><span id="identity-status"></span></span>
      </div>
    </div>

    <section class="section s1" data-section="about">
      <div class="sec-head"></div>
      <div class="prose" id="about-body"></div>
    </section>

    <section class="section s2" data-section="cases">
      <div class="sec-head"></div>
      <div class="cases" id="cases-list"></div>
    </section>

    <section class="section s3" data-section="lens">
      <div class="sec-head"></div>
      <div class="lens" id="lens-list"></div>
    </section>

    <section class="section s4" data-section="contact">
      <div class="sec-head"></div>
      <div class="contact-grid" id="contact-grid"></div>
      <div style="margin-top:24px">
        <input type="text" id="message-input"
          style="width:100%;max-width:400px;background:transparent;border:none;
                 border-bottom:1px solid var(--line);padding:8px 0;color:var(--text);
                 font-family:inherit;font-size:13px;outline:none;"
          onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--line)'">
      </div>
    </section>

    <footer id="site-footer"></footer>

  </div>

  <!-- Avatar column -->
  <div class="avatar-col">
    <div class="avatar-wrap">
      <canvas id="avatar"></canvas>
      <div class="avatar-label"><span class="blink-dot"></span><span id="avatar-label-text"></span></div>
      <div class="try-hint">
        try: <span id="try-hint-keys"></span>
      </div>
    </div>
  </div>

</div>

<script src="scripts/render.js"></script>
<script src="scripts/avatar.js"></script>
<script src="scripts/boot.js"></script>
</body>
</html>
